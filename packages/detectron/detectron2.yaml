
# ==========================================
# 1. Package Metadata & Python Requirements
# ==========================================
package:
  name: detectron2
  version: "1.2.0"
  description: "A high-performance computer vision library with C++ bindings."
  python_requires: ">=3.7"

  # Standard Python dependencies installed via pip
  python_dependencies:
    - torch>=1.18
    - pybind11>=2.10.0

# ==========================================
# 2. System Requirements
# ==========================================
system_requirements:

  # ----------------------------------------
  # LINUX
  # ----------------------------------------
  linux:
    ubuntu:
      # Constraint for Ubuntu 20.04 and 22.04
      - os_version: ">=20.04"
        package_manager: "apt"
        pre_install:
          - "apt-get update"
        packages:
          - build-essential     # C++ Compilers
          - cmake               # Build system
          - python3-dev         # Python headers
          - libopencv-dev       # Core OS library required by HypoCV
        env_vars:
          CMAKE_BUILD_TYPE: "Release"

      # Fallback constraint for older Ubuntu (e.g., 18.04)
      - os_version: "==18.04"
        package_manager: "apt"
        pre_install:
          - "apt-get update"
          - "add-apt-repository ppa:ubuntu-toolchain-r/test -y" # Need newer GCC
          - "apt-get update"
        packages:
          - gcc-9
          - g++-9
          - cmake
          - python3-dev
          - libopencv-dev
        env_vars:
          CC: "gcc-9"
          CXX: "g++-9"

    centos:
      # CentOS / RHEL 8 and newer
      - os_version: ">=8"
        package_manager: "dnf"
        pre_install:
          - "dnf install epel-release -y"
          - "dnf config-manager --set-enabled powertools"
        packages:
          - gcc-c++
          - cmake
          - python3-devel
          - opencv-devel

  # ----------------------------------------
  # MACOS
  # ----------------------------------------
  macos:
    all:
      # macOS 11 (Big Sur) and newer
      - os_version: ">=11.0"
        package_manager: "brew"
        pre_install:
          - "brew update"
        packages:
          - cmake
          - opencv
        env_vars:
          # macOS often requires explicit paths to brew-installed libraries
          CPPFLAGS: "-I/usr/local/opt/opencv/include"
          LDFLAGS: "-L/usr/local/opt/opencv/lib"

  # ----------------------------------------
  # WINDOWS
  # ----------------------------------------
  windows:
    all:
      - os_version: ">=10"
        package_manager: "choco"
        packages:
          - cmake --installargs 'ADD_CMAKE_TO_PATH=System'
          - visualstudio2022buildtools
          - opencv
        env_vars:
          OpenCV_DIR: "C:\\tools\\opencv\\build"

# ==========================================
# 3. Post-Install Instructions
# ==========================================
# Commands to execute after OS dependencies are met, but before Python install
build_steps:
  - "python -m pip install wheel"
  - "python setup.py bdist_wheel"